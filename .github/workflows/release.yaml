---
name: Release

# yamllint disable-line rule:truthy
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_repository.full_name == github.repository
    name: Release new version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵️ Check out the default branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 🔎 Detect and validate new version
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          branch_sha="$(gh api \
            "repos/$GITHUB_REPOSITORY/commits/$DEFAULT_BRANCH" \
            --jq '.sha')"
          if [[ "$RELEASE_SHA" != "$branch_sha" ]]; then
            message="The default branch moved after this CI run. Its newer CI run will handle the release."
            echo "::notice title=Stale run::$message"
            echo "SHOULD_RELEASE=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]]; then
            echo "::error title=Wrong commit::The checked-out commit does not match the successful CI run."
            exit 1
          fi

          VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("tailscale/config.yaml").read_text()
          matches = re.findall(r"^version:\s*([^\s#]+)\s*(?:#.*)?$", text, re.MULTILINE)
          if len(matches) != 1:
              message = "Expected exactly one top-level version in tailscale/config.yaml."
              raise SystemExit(f"::error title=Invalid config::{message}")
          print(matches[0])
          PY
          )"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid version::Version must use stable X.Y.Z format."
            exit 1
          fi

          previous_version="$(git show HEAD^:tailscale/config.yaml 2>/dev/null \
            | sed -nE 's/^version:[[:space:]]*([^[:space:]#]+).*$/\1/p')"
          tag="v$VERSION"
          if git show-ref --verify --quiet "refs/tags/$tag"; then
            if [[ "$previous_version" != "$VERSION" ]]; then
              echo "::error title=Duplicate version::$tag already exists; refusing the version change."
              exit 1
            fi
            echo "::notice title=No release needed::$tag already exists."
            echo "SHOULD_RELEASE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "$previous_version" != "$VERSION" ]]; then
              message="A release for $tag already exists; refusing the version change."
              echo "::error title=Duplicate version::$message"
              exit 1
            fi
            echo "::notice title=No release needed::A release for $tag already exists."
            echo "SHOULD_RELEASE=false" >> "$GITHUB_ENV"
            exit 0
          fi

          latest_tag="$(python - <<'PY'
          import re
          import subprocess

          versions = []
          for tag in subprocess.check_output(["git", "tag", "--list"], text=True).splitlines():
              match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", tag)
              if match:
                  versions.append((tuple(map(int, match.groups())), tag))
          print(max(versions)[1] if versions else "")
          PY
          )"

          if [[ -n "$latest_tag" ]]; then
            if ! git merge-base --is-ancestor "$latest_tag" "$RELEASE_SHA"; then
              echo "::error title=Diverged history::$latest_tag is not an ancestor of the default branch."
              exit 1
            fi
            if ! python - "$VERSION" "${latest_tag#v}" <<'PY'
          import sys

          requested = tuple(map(int, sys.argv[1].split(".")))
          latest = tuple(map(int, sys.argv[2].split(".")))
          raise SystemExit(0 if requested > latest else 1)
          PY
            then
              if [[ "$previous_version" != "$VERSION" ]]; then
                message="$VERSION is not newer than ${latest_tag#v}; refusing the version change."
                echo "::error title=Version not newer::$message"
                exit 1
              fi

              echo "::notice title=No release needed::$VERSION is not newer than ${latest_tag#v}."
              echo "SHOULD_RELEASE=false" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          {
            echo "## New version detected"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Tag: \`$tag\`"
            echo "- Commit: \`$RELEASE_SHA\`"
            echo "- Previous release: \`${latest_tag:-none}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHOULD_RELEASE=true" >> "$GITHUB_ENV"

      - name: 🚀 Publish latest GitHub release
        if: env.SHOULD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh release create "v$VERSION" \
            --target "$RELEASE_SHA" \
            --title "v$VERSION" \
            --generate-notes \
            --latest

          echo "Released [v$VERSION]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/v$VERSION)." \
            >> "$GITHUB_STEP_SUMMARY"
