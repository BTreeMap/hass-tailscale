---
name: Deploy

concurrency:
  group: queue

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      environment:
        description: Overrides the detected deployment environment
        required: false
        type: string
      version:
        description: Overrides the detected image version
        required: false
        type: string
permissions:
  contents: read

jobs:
  information:
    if: |
      github.event_name == 'release'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'push'
        && github.event.workflow_run.head_repository.full_name == github.repository
      )
    name: ℹ️ Gather add-on information
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.information.outputs.architectures }}
      description: ${{ steps.information.outputs.description }}
      environment: ${{ steps.release.outputs.environment }}
      name: ${{ steps.information.outputs.name }}
      registry_owner: ${{ steps.registry_owner.outputs.registry_owner }}
      slug: ${{ steps.information.outputs.slug }}
      target: ${{ steps.information.outputs.target }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: ⚡ Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          cache-dependency-glob: uv.lock
          enable-cache: true
          version: "0.11.30"

      - name: 🧰 Install locked dependencies
        run: uv sync --locked --no-dev

      - name: ℹ️ Validate add-on information
        id: information
        run: uv run scripts/addon_info.py tailscale/config.yaml --github-output "$GITHUB_OUTPUT"

      - name: 🔡 Normalize registry owner for GHCR
        id: registry_owner
        run: echo "registry_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: ℹ️ Gather version and environment
        id: release
        run: |
          sha="${{ github.sha }}"
          environment="edge"
          version="${sha:0:7}"
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
            environment="${{ inputs.environment }}"
          elif [[ "${{ github.event_name }}" = "release" ]]; then
            version="${{ github.event.release.tag_name }}"
            version="${version,,}"
            version="${version#v}"
            environment="stable"
            if [[ "${{ github.event.release.prerelease }}" = "true" ]]; then
              environment="beta"
            fi
          fi

          if [[ ! "$environment" =~ ^(edge|beta|stable)$ ]]; then
            echo "::error title=Invalid environment::Unsupported deployment environment: $environment"
            exit 1
          fi
          if [[ ! "$version" =~ ^([0-9a-f]{7}|[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?)$ ]]; then
            echo "::error title=Invalid version::Unsupported image version: $version"
            exit 1
          fi

          echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  deploy:
    name: 👷 Build & Deploy ${{ matrix.architecture }}
    needs: information
    permissions:
      contents: read
      packages: write
    # yamllint disable rule:line-length
    runs-on: ${{ contains(fromJson('["aarch64"]'), matrix.architecture) && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    # yamllint enable rule:line-length
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.information.outputs.architectures) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: 🏗 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: ℹ️ Compose build flags
        id: flags
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

          if [[ "${{ matrix.architecture }}" = "amd64" ]]; then
            echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.architecture }}" = "aarch64" ]]; then
            echo "platform=linux/arm64/v8" >> "$GITHUB_OUTPUT"
          else
            echo "::error ::Could not determine platform for architecture ${{ matrix.architecture }}"
            exit 1
          fi
      - name: 🚀 Build
        uses: docker/build-push-action@v7
        with:
          load: true
          # yamllint disable rule:line-length
          tags: |
            ghcr.io/${{ needs.information.outputs.registry_owner }}/${{ needs.information.outputs.slug }}/${{ matrix.architecture }}:${{ needs.information.outputs.environment }}
            ghcr.io/${{ needs.information.outputs.registry_owner }}/${{ needs.information.outputs.slug }}/${{ matrix.architecture }}:${{ needs.information.outputs.version }}
          # yamllint enable rule:line-length
          context: ${{ needs.information.outputs.target }}
          file: ${{ needs.information.outputs.target }}/Dockerfile
          # yamllint disable rule:line-length
          cache-from: |
            type=gha,scope=${{ matrix.architecture }}
            ghcr.io/${{ needs.information.outputs.registry_owner }}/${{ needs.information.outputs.slug }}/${{ matrix.architecture }}:edge
          # yamllint enable rule:line-length
          cache-to: type=gha,mode=max,scope=${{ matrix.architecture }}
          platforms: ${{ steps.flags.outputs.platform }}
          build-args: |
            BUILD_ARCH=${{ matrix.architecture }}
            BUILD_DATE=${{ steps.flags.outputs.date }}
            BUILD_DESCRIPTION=${{ needs.information.outputs.description }}
            BUILD_NAME=${{ needs.information.outputs.name }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ needs.information.outputs.version }}

      - name: 🏗 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🚀 Push
        # yamllint disable rule:line-length
        run: |
          docker push \
            "ghcr.io/${{ needs.information.outputs.registry_owner }}/${{ needs.information.outputs.slug }}/${{ matrix.architecture }}:${{ needs.information.outputs.environment }}"
          docker push \
            "ghcr.io/${{ needs.information.outputs.registry_owner }}/${{ needs.information.outputs.slug }}/${{ matrix.architecture }}:${{ needs.information.outputs.version }}"

  publish-manifest:
    name: 📦 Publish multi-arch manifest
    needs:
      - information
      - deploy
    permissions:
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏗️  Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 📦 Create and push manifest
        # yamllint disable rule:line-length
        run: |
          repository="ghcr.io/${{ needs.information.outputs.registry_owner }}/${{ needs.information.outputs.slug }}"
          for tag in "${{ needs.information.outputs.environment }}" "${{ needs.information.outputs.version }}"; do
            docker buildx imagetools create \
              --tag "$repository:$tag" \
              "$repository/amd64:$tag" \
              "$repository/aarch64:$tag"
          done
        # yamllint enable rule:line-length
